<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>test</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0b0f14;
color:white;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#00ff8840,transparent 25%),
radial-gradient(circle at bottom right,#00ccff30,transparent 30%),
#0b0f14;
z-index:-1;
}

.container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
padding:20px;
}

.logo{
font-size:64px;
font-weight:700;
background:linear-gradient(90deg,#00ff88,#00ccff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
opacity:.7;
}

.search{
width:min(700px,95%);
display:flex;
gap:10px;
background:#111827;
padding:14px;
border-radius:18px;
border:1px solid #1f2937;
box-shadow:0 0 25px #00ff8830;
}

.search input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:18px;
}

.search button{
background:linear-gradient(90deg,#00ff88,#00ccff);
border:none;
padding:12px 22px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.quick{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.quick button{
background:#111827;
border:1px solid #1f2937;
padding:10px 18px;
border-radius:12px;
color:white;
cursor:pointer;
}

.loading{
position:fixed;
inset:0;
background:#0b0f14;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
z-index:9999;
}

.spinner{
width:70px;
height:70px;
border-radius:50%;
border:6px solid #1f2937;
border-top:6px solid #00ff88;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

<div class="logo">
test
</div>

<div class="subtitle">
Powered by Scramjet
</div>

<div class="search">
<input id="url" placeholder="Search or enter URL">
<button onclick="go()">
Go
</button>
</div>

<div class="quick">
<button onclick="quick('https://google.com')">
Google
</button>

<button onclick="quick('https://youtube.com')">
YouTube
</button>

<button onclick="quick('https://discord.com/app')">
Discord
</button>

<button onclick="quick('https://github.com')">
GitHub
</button>
</div>

</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<div>Loading...</div>
</div>

<script src="/scram/scramjet.controller.js"></script>

<script>
navigator.serviceWorker.register("/sw.js");

async function openProxy(url){

document.getElementById("loading")
.style.display="flex";

if(!url.startsWith("http")){
url="https://"+url;
}

await new Promise(r=>setTimeout(r,500));

location.href=
"/scram/service/" +
scramjet.encodeUrl(url);
}

function go(){
openProxy(
document.getElementById("url").value
);
}

function quick(url){
openProxy(url);
}

document.getElementById("url")
.addEventListener("keydown",e=>{
if(e.key==="Enter"){
go();
}
});
</script>

</body>
</html>
